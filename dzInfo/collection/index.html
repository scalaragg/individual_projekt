<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Collection - Canvas</title>
</head>
<body>
    <main class="container" id="mainContainer">
        <section class="gallery-card" aria-label="Галерея изображений">
            <h1 class="title">Collection</h1>

            <div class="img-container" id="imgContainer">
                <canvas id="gameCanvas" width="640" height="480"></canvas>
            </div>

            <div class="controller-container" id="controllerContainer">
                <button type="button" id="prevBut" aria-label="Предыдущее изображение">⏪</button>
                <span id="count" class="counter" aria-live="polite"></span>
                <button type="button" id="nextBut" aria-label="Следующее изображение">⏩</button>
            </div>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="game.js"></script>
    <script src="script.js"></script>
</body>
</html>
